<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A recorded Aiki model-council decision replay.">
    <meta name="theme-color" content="#ebe7dc">
    <title>Aiki — recorded council replay</title>
    <link rel="stylesheet" href="./replay.css?v=hd1">
  </head>
  <body>
    <a class="skip-link" href="#decision">Skip to the decision</a>

    <header class="record-bar" aria-label="Replay status">
      <span class="record-bar__mark" aria-hidden="true"></span>
      <strong>Recorded real run — no models are running.</strong>
      <span id="replay-progress">Loading verified artifact…</span>
    </header>

    <div class="workspace">
      <aside class="pane sessions-pane" id="sessions-pane" aria-label="Recorded session">
        <div class="pane-heading brand-heading">
          <a class="brand" href="#decision" aria-label="Aiki decision council home">
            <span class="brand-mark" aria-hidden="true">A</span>
            <span><strong>aiki</strong><small>decision council</small></span>
          </a>
          <button class="icon-button drawer-close" type="button" data-close-drawer aria-label="Close sessions">×</button>
        </div>
        <div id="session-content" class="pane-scroll pane-scroll--left">
          <div class="skeleton skeleton--session" aria-hidden="true"></div>
        </div>
        <footer class="pane-footer">
          <span class="eyebrow">Public replay</span>
          <p>Sanitized, artifact-backed, and read-only.</p>
        </footer>
      </aside>

      <main class="decision-pane" id="decision" tabindex="-1">
        <nav class="mobile-toolbar" aria-label="Workspace panels">
          <button type="button" data-open-drawer="sessions-pane">
            <span aria-hidden="true">☰</span> Session
          </button>
          <span class="mobile-brand">aiki</span>
          <button type="button" data-open-drawer="activity-pane">
            Activity <span aria-hidden="true">↗</span>
          </button>
        </nav>
        <div class="decision-scroll">
          <div id="decision-content" class="decision-content" aria-busy="true">
            <div class="loading-card" role="status">
              <span class="loading-rule"></span>
              <p>Opening the recorded decision…</p>
            </div>
          </div>
        </div>
      </main>

      <aside class="pane activity-pane" id="activity-pane" aria-label="Recorded council activity">
        <div class="pane-heading activity-heading">
          <div>
            <span class="eyebrow">Council activity</span>
            <h2>Artifact replay</h2>
          </div>
          <button class="icon-button drawer-close" type="button" data-close-drawer aria-label="Close activity">×</button>
        </div>
        <div id="activity-content" class="pane-scroll">
          <div class="skeleton skeleton--activity" aria-hidden="true"></div>
        </div>
      </aside>
    </div>

    <button class="drawer-backdrop" type="button" data-close-drawer aria-label="Close open panel" hidden></button>
    <div id="live-region" class="sr-only" aria-live="polite"></div>
    <script src="./replay.js?v=hd1" defer></script>
  </body>
</html>
